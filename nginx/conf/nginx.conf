worker_processes  1;
load_module modules/ngx_http_modsecurity_module.so;

error_log  /dev/stdout;
error_log  /dev/stdout notice;
error_log  /dev/stdout info;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 25m;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /dev/stdout;
    error_log  /dev/stdout;
    error_log  /dev/stdout notice;
    error_log  /dev/stdout info;
    sendfile        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # auth_limit   : brute-force / credential-stuffing protection  (10 req/min)
    # llm_limit    : AI cost-budget protection                     ( 5 req/min)
    # upload_limit : file-upload bandwidth / storage protection    ( 5 req/s  )
    # ws_limit     : WebSocket connection-establishment flood       (10 req/s  )
    # search_limit : search query rate control                     (20 req/s  )
    # api_limit    : general API request throttling                (60 req/s  )
    # static_limit : frontend static-asset delivery               (100 req/s  )
    # conn_limit   : per-IP concurrent connection cap             (shared zone)
    # ---------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m   rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=llm_limit:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=upload_limit:10m rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=ws_limit:10m     rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=search_limit:10m rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=60r/s;
    limit_req_zone  $binary_remote_addr zone=static_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Return 429 Too Many Requests instead of default 503
    limit_req_status  429;
    limit_conn_status 429;

    # WebSocket/HTTP upgrade helper for proxied apps (n8n push channel).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_gateway_upstream {
        server api-gateway:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream chat_upstream {
        server chat_service:8007 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream auth_service_upstream {
        server auth_service:8001 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream file_service_upstream {
        server file_service:8002 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream users_service_upstream {
        server users_service:8003 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream friendship_service_upstream {
        server friendship_service:8004 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream post_service_upstream {
        server post_service:8005 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream notification_service_upstream {
        server notification_service:8006 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream llm_service_upstream {
        server llm_service:8008 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream search_service_upstream {
        server search_service:8000 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    upstream prometheus_upstream {
        server prometheus:9090 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    upstream grafana_upstream {
        server grafana:3000 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    upstream vault_upstream {
        server vault:8200 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    upstream n8n_upstream {
        server n8n:5678 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    upstream node_exporter_upstream {
        server node-exporter:9100 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    upstream cadvisor_upstream {
        server cadvisor:8080 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    upstream frontend_upstream {
        server frontend:3000 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        # enable ModSecurity for HTTP host (rules file provided by image)
        modsecurity on;
        modsecurity_rules_file /usr/local/nginx/conf/modsecurity.conf;
        return 301 https://$host$request_uri;
    }

    # HTTPS server with proxy to API Gateway
    server {
        listen 443 ssl;
        server_name _;

        # enable ModSecurity for HTTPS
        modsecurity on;
        modsecurity_rules_file /usr/local/nginx/conf/modsecurity.conf;

        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        port_in_redirect on;
        absolute_redirect off;

        # Global concurrent-connection cap per IP (all locations in this vhost)
        limit_conn conn_limit 50;

        # Chat WebSocket (backend)
        location /ws/ {
            # WebSocket upgrade requests include long JWT query strings.
            # Disable ModSecurity here and relax limits to avoid 429/false positives.
            modsecurity off;
            limit_req  zone=ws_limit burst=50 nodelay;
            limit_conn conn_limit 50;
            proxy_pass http://chat_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        }

        # Internal HTTPS mesh routes for microservice-to-microservice calls.
        location /_internal/auth_service/ {
            proxy_pass http://auth_service_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        }

